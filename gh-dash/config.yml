prSections:
- title: Review requested
  filters: is:open user-review-requested:@me draft:false
- title: Opened
  filters: is:open author:@me draft:false
- title: Drafts
  filters: is:open author:@me draft:true

issuesSections:
- title: Authored by me
  filters: is:open author:@me
- title: Assigned to me
  filters: is:open assignee:@me
- title: Platform Core
  filters: is:open project:classtinginc/26

defaults:
  preview:
    open: false
    width: 100
  view: issues

keybindings:
  prs:
    - key: e
      command: >
        wezterm cli spawn --cwd {{.RepoPath}} --new-window -- nu -c 'gh pr edit {{.PrNumber}}'
  issues:
    - key: e
      command: >
        wezterm cli spawn --cwd ~/Workspace/organization --new-window -- nu -c 'gh issue edit {{.IssueNumber}}'

repoPaths:
  classtinginc/organization: ~/Workspace/reviews/organization
  classtinginc/classroom-service: ~/Workspace/reviews/classroom-service
  classtinginc/graphql: ~/Workspace/reviews/graphql
  classtinginc/media-service: ~/Workspace/reviews/media-service
  classtinginc/frontend: ~/Workspace/classting-frontend
  classtinginc/account-service: ~/Workspace/account-service
        
